patch:
  # 1. 彻底干掉 0.50 版抢占 Tab 的新组件 (关键修复)
  "selector/bindings":
    Tab: noop
    ISO_Left_Tab: noop
    Shift+Tab: noop

  # 2. 还原你 0.40 版的 key_binder 补丁逻辑
  "key_binder/bindings":
    __patch:
      - key_bindings:/emacs_editing
      - key_bindings:/move_by_word_with_tab
      - key_bindings:/paging_with_minus_equal
      - key_bindings:/paging_with_comma_period
      - key_bindings:/numbered_mode_switch

  # 3. 还原你习惯的 Alt+grave 触发
  "switcher/hotkeys":
    - Alt+grave
    - Control+Shift+grave
